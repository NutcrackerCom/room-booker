services:
  db:
    image: postgres:16
    container_name: room-booking-db
    environment:
      POSTGRES_DB: room_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_booking"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: room-booking-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/room_booking?sslmode=disable
      JWT_SECRET: super-secret-key
    ports:
      - "8080:8080"

volumes:
  pgdata: